<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Clapperboard body -->
  <rect x="6" y="13" width="20" height="13" rx="2" fill="#a78bfa"/>
  <!-- Clapperboard stripes (top flap) -->
  <rect x="6" y="9" width="20" height="5" rx="2" fill="#7c3aed"/>
  <!-- Stripes on top flap -->
  <rect x="9" y="9" width="2" height="5" fill="#0f172a" opacity="0.4"/>
  <rect x="14" y="9" width="2" height="5" fill="#0f172a" opacity="0.4"/>
  <rect x="19" y="9" width="2" height="5" fill="#0f172a" opacity="0.4"/>
  <!-- Play triangle -->
  <polygon points="13,17 13,23 20,20" fill="#0f172a" opacity="0.6"/>
</svg>
